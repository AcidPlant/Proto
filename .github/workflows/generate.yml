name: Generate Proto Code.

on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout protos repo
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install protoc
        run: sudo apt-get install -y protobuf-compiler

      - name: Install Go plugins
        run: |
          go install google.golang.org/protobuf/cmd/protoc-gen-go@latest
          go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Generate code
        run: |
          mkdir -p gen/payment/v1 gen/order/v1
          protoc --go_out=gen --go_opt=paths=source_relative \
                 --go-grpc_out=gen --go-grpc_opt=paths=source_relative \
                 payment/v1/payment.proto \
                 order/v1/order.proto

      - name: Initialize go.mod in generated output
        run: |
          cd gen
          cat > go.mod << 'EOF'
          module github.com/AcidPlant/generated-code

          go 1.22

          require (
            google.golang.org/grpc v1.65.0
            google.golang.org/protobuf v1.34.2
          )
          EOF
          go mod tidy || true

      - name: Push generated code to Generated-Code repo
        uses: cpina/github-action-push-to-another-repository@main
        env:
          API_TOKEN_GITHUB: ${{ secrets.GEN_REPO_TOKEN }}
        with:
          source-directory: gen
          destination-github-username: AcidPlant
          destination-repository-name: generated-code
          user-email: 'acidplayer200775@gmail.com'
          target-branch: main
          commit-message: "chore: regenerate pb.go from commit ${{ github.sha }}"
